<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday VAMAN ❤️</title>
    <style>
        body {
            background: black;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            color: pink;
        }

        .slideshow {
            width: 250px;
            height: 300px;
            margin: auto;
            position: relative;
        }

        .slideshow img {
            width: 100%;
            height: 100%;
            position: absolute;
            border-radius: 20px;
            opacity: 0;
            animation: slide 12s infinite;
        }

        .slideshow img:nth-child(1) { animation-delay: 0s; }
        .slideshow img:nth-child(2) { animation-delay: 4s; }
        .slideshow img:nth-child(3) { animation-delay: 8s; }

        @keyframes slide {
            0% {opacity:0;}
            10% {opacity:1;}
            30% {opacity:1;}
            40% {opacity:0;}
            100% {opacity:0;}
        }
    </style>
</head>
<body>

<h1>Happy Birthday VAMAN 🎉</h1>

<div class="slideshow">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
</div>

<p>
Some moments with you just stay forever…  
You make everything feel special.  
And somewhere quietly… you are loved more than you know ❤️
</p>

<audio autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

</body>
</html>
